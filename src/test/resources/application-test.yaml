spring:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: true
  sql:
    init:
      mode: never
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-my-super-secret-key}
    expiration-ms: ${JWT_EXPIRATION:86400000}

logging:
  level:
    org.springframework: INFO
    org.flywaydb: DEBUG
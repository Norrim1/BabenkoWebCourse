spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  server:
    port: 8081
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:/db/migration
  jwt:
    secret: ${JWT_SECRET:my-super-secret-key-my-super-secret-key}
    expiration-ms: ${JWT_EXP  IRATION:86400000}
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  server:
    port: 8081
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:/db/migration
  jwt:
    secret:
    expiration-ms:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
    cache:
      type: redis
      redis:
        time-to-live: 300000

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
